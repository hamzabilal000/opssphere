services:
  mongodb:
    image: mongo:7
    container_name: opssphere-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  valkey:
    image: valkey/valkey:8
    container_name: opssphere-valkey
    restart: unless-stopped
    ports:
      - "6379:6379"

  mailpit:
    image: axllent/mailpit:latest
    container_name: opssphere-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web inbox UI

  minio:
    image: minio/minio:latest
    container_name: opssphere-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: opssphere
      MINIO_ROOT_PASSWORD: opssphere123
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console UI
    volumes:
      - minio_data:/data

volumes:
  mongodb_data:
  minio_data:
